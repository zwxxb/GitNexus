name: Dependency Review

# Blocks PRs that introduce dependencies with high/critical known vulnerabilities.
# Reads the dependency graph diff between PR head and base.
#
# This is a required-check candidate after one week of clean runs
# (operator decision — see docs/plans/2026-05-03-001-feat-automated-security-scans-plan.md).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      # pull-requests:write enables the inline summary comment on failure.
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
